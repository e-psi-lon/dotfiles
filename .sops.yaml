  - &host_asus "age1sgy75g9y78e4s5kh420cgu9u8yt3k9u27yxjvvtu7czwtct3s49s0h8q3r"
  - &host_hp "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIAC7Euhsz1t1i1J5Y/XecPtuLhO50r1El6pRTlZDCI0J root@nixos-hp" # TODO: Migrate to proper age key

creation_rules:
  # Base pattern: Give the user access to everything by default, plus specific hosts based on yaml filename
  - path_regex: resources/secrets/asus\.yaml$
    key_groups:
      - age:
          - *user_e-psi-lon
          - *host_asus

  - path_regex: resources/secrets/hp\.yaml$
    key_groups:
      - age:
          - *user_e-psi-lon
          - *host_hp

  - path_regex: resources/secrets/.*\.yaml$
    key_groups:
      - age:
          - *user_e-psi-lon
          - *host_asus
          - *host_hp
